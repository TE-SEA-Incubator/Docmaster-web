<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocMaster — Mes déclarations</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/sidebar.js"></script>
  <link href="css/output.css" rel="stylesheet" />
  <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#F5A64B', dark: '#D98A30', light: '#FEF0DC' },
            'green-dark': '#1E3A2F',
            'green-mid': '#2D5A42',
            'green-light': '#E8F5EE',
            bgMain: '#F4EFE6',
            surface: '#FFFFFF',
            surface2: '#FAF7F2',
            textMain: '#1A1A1A',
            textMuted: '#9CA3AF',
            borderMain: '#EAE3D8',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            bricolage: ['"Bricolage Grotesque"', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    :root { --sidebar: 260px; }
    html, body { font-family: 'Poppins', sans-serif; background: #F4EFE6; }
    body { min-height: 100vh; overflow-x: hidden; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar);
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      z-index: 50;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sidebar.open { transform: translateX(0); }
    .sb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 40;
      backdrop-filter: blur(3px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s;
    }
    .sb-overlay.show { display: block; opacity: 1; pointer-events: all; }
    .main-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .main-content { flex: 1; }
    @media (min-width: 900px) {
      body { display: flex; height: 100vh; overflow: hidden; }
      .sidebar { position: relative; transform: none !important; flex-shrink: 0; }
      .main-wrapper { flex: 1; min-width: 0; height: 100vh; overflow: hidden; }
      .main-content { overflow-y: auto; }
    }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #DDD5C8; border-radius: 10px; }
  </style>
</head>
<body>

<div id="sidebar-root"></div>

<div class="main-wrapper" id="mainWrapper">
  <header class="sticky top-0 z-30 h-[58px] bg-white border-b border-borderMain flex items-center px-4 gap-3 flex-shrink-0">
    <button class="w-9 h-9 flex items-center justify-center rounded-[9px] bg-surface2 border border-borderMain text-textMain text-base cursor-pointer hover:border-primary hover:text-primary transition-all" onclick="toggleSb()">
      <i class="fa-solid fa-bars"></i>
    </button>
    <span class="font-bricolage text-base font-bold text-textMain tracking-tight">Mes déclarations</span>
    <div class="dm-quick-search hidden"></div>
    <div class="dm-quick-actions hidden"></div>
    <div class="ml-auto flex items-center gap-2">
      <a href="declarer.html" class="hidden sm:inline-flex items-center gap-1.5 px-3 py-2 rounded-[10px] bg-red-600 text-[11.5px] font-bold text-white hover:bg-red-700 transition-colors">
        <i class="fa-solid fa-triangle-exclamation text-[11px]"></i> Déclarer une perte
      </a>
      <a href="trouverdocument.html" class="hidden sm:inline-flex items-center gap-1.5 px-3 py-2 rounded-[10px] bg-blue-600 text-[11.5px] font-bold text-white hover:bg-blue-700 transition-colors">
        <i class="fa-solid fa-file-circle-check text-[11px]"></i> Déclarer trouvé
      </a>
    </div>
  </header>

  <main class="main-content custom-scroll p-4 sm:p-6 pb-24 md:pb-8 flex flex-col gap-4">
    <section class="bg-white border border-borderMain rounded-[18px] p-4 sm:p-5">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h1 class="font-bricolage text-xl sm:text-2xl font-extrabold text-textMain">Historique de vos déclarations</h1>
          <p class="text-[12.5px] text-textMuted mt-1">Suivez l'état de vos pertes et de vos documents trouvés.</p>
        </div>
        <div class="flex gap-2 sm:hidden">
          <a href="declarer.html" class="flex-1 inline-flex items-center justify-center gap-1.5 px-3 py-2.5 rounded-[10px] bg-red-600 text-white text-[12px] font-bold">
            <i class="fa-solid fa-triangle-exclamation text-[11px]"></i> Déclarer perte
          </a>
          <a href="trouverdocument.html" class="flex-1 inline-flex items-center justify-center gap-1.5 px-3 py-2.5 rounded-[10px] bg-blue-600 text-white text-[12px] font-bold">
            <i class="fa-solid fa-file-circle-check text-[11px]"></i> Déclarer trouvé
          </a>
        </div>
      </div>

      <div class="mt-4 flex flex-wrap items-center gap-2">
        <button class="filter-pill px-3 py-1.5 rounded-full border border-borderMain bg-bgMain text-textMuted text-[12px] font-semibold" data-filter="all">Toutes</button>
        <button class="filter-pill px-3 py-1.5 rounded-full border border-borderMain bg-bgMain text-textMuted text-[12px] font-semibold" data-filter="perdu">Pertes</button>
        <button class="filter-pill px-3 py-1.5 rounded-full border border-borderMain bg-bgMain text-textMuted text-[12px] font-semibold" data-filter="trouve">Trouvés</button>
      </div>
    </section>

    <section id="declaration-list" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></section>

    <section id="empty-state" class="hidden bg-white border border-borderMain rounded-[18px] p-8 text-center">
      <div class="w-14 h-14 mx-auto rounded-2xl bg-bgMain border border-borderMain flex items-center justify-center mb-3">
        <i class="fa-solid fa-folder-open text-textMuted text-xl"></i>
      </div>
      <p class="text-[15px] font-semibold text-textMain">Aucune déclaration pour ce filtre</p>
      <p class="text-[12px] text-textMuted mt-1">Essayez un autre filtre ou créez une nouvelle déclaration.</p>
    </section>
  </main>
</div>

<script>
  const declarations = [
    { id: 'DEC-24012', type: 'perdu', title: 'Carte nationale d\'identité', owner: 'Jean Dupont', date: '2026-03-08', lieu: 'Yaoundé - Bastos', etat: 'en_cours' },
    { id: 'DEC-24013', type: 'trouve', title: 'Permis de conduire', owner: 'Marie Essono', date: '2026-03-10', lieu: 'Douala - Bonapriso', etat: 'nouveau' },
    { id: 'DEC-24014', type: 'perdu', title: 'Carte bancaire', owner: 'Paul Mvondo', date: '2026-03-12', lieu: 'Yaoundé - Mvan', etat: 'resolu' },
    { id: 'DEC-24015', type: 'trouve', title: 'Passeport', owner: 'Clarisse Ndzi', date: '2026-03-14', lieu: 'Bafoussam - Marché A', etat: 'en_cours' }
  ];

  const state = { filter: 'all' };

  function getTypeLabel(type) {
    return type === 'perdu' ? 'Perte' : 'Trouvé';
  }

  function getEtatMeta(etat) {
    if (etat === 'nouveau') return { label: 'Nouveau', cls: 'bg-blue-50 text-blue-700 border-blue-100' };
    if (etat === 'resolu') return { label: 'Résolu', cls: 'bg-green-50 text-green-700 border-green-100' };
    return { label: 'En cours', cls: 'bg-amber-50 text-amber-700 border-amber-100' };
  }

  function formatDate(value) {
    return new Date(value).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function renderCards() {
    const listRoot = document.getElementById('declaration-list');
    const empty = document.getElementById('empty-state');

    const list = declarations.filter(item => state.filter === 'all' || item.type === state.filter);

    if (!list.length) {
      listRoot.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }

    empty.classList.add('hidden');

    listRoot.innerHTML = list.map((item) => {
      const etat = getEtatMeta(item.etat);
      const typeBadgeClass = item.type === 'perdu'
        ? 'bg-red-50 text-red-700 border-red-100'
        : 'bg-green-50 text-green-700 border-green-100';
      const typeIcon = item.type === 'perdu' ? 'fa-triangle-exclamation' : 'fa-file-circle-check';

      return `
        <article class="bg-white border border-borderMain rounded-[18px] p-4 sm:p-5">
          <div class="flex items-start justify-between gap-3 mb-3">
            <div class="min-w-0">
              <p class="text-[11px] font-bold text-textMuted uppercase tracking-wide">${item.id}</p>
              <h3 class="font-bricolage text-[18px] font-bold text-textMain leading-tight mt-0.5">${item.title}</h3>
            </div>
            <span class="px-2.5 py-1 rounded-full border text-[11px] font-bold ${typeBadgeClass}">
              <i class="fa-solid ${typeIcon} mr-1"></i>${getTypeLabel(item.type)}
            </span>
          </div>

          <div class="space-y-1.5 text-[12.5px] text-textMuted">
            <p><i class="fa-regular fa-user mr-1.5"></i> ${item.owner}</p>
            <p><i class="fa-regular fa-calendar mr-1.5"></i> ${formatDate(item.date)}</p>
            <p><i class="fa-solid fa-location-dot mr-1.5"></i> ${item.lieu}</p>
          </div>

          <div class="mt-4 flex items-center justify-between gap-3">
            <span class="px-2.5 py-1 rounded-full border text-[11px] font-semibold ${etat.cls}">${etat.label}</span>
            <button class="px-3 py-1.5 rounded-[9px] bg-surface2 border border-borderMain text-[12px] font-semibold text-textMuted hover:border-primary hover:text-primary transition-colors">Voir détails</button>
          </div>
        </article>
      `;
    }).join('');
  }

  function applyFilter(filter) {
    state.filter = filter;

    document.querySelectorAll('.filter-pill').forEach((btn) => {
      const isActive = btn.dataset.filter === filter;
      btn.classList.toggle('bg-primary', isActive);
      btn.classList.toggle('text-white', isActive);
      btn.classList.toggle('border-primary', isActive);
      btn.classList.toggle('bg-bgMain', !isActive);
      btn.classList.toggle('text-textMuted', !isActive);
      btn.classList.toggle('border-borderMain', !isActive);
    });

    renderCards();
  }

  function initPage() {
    const queryFilter = new URLSearchParams(window.location.search).get('type');
    const initialFilter = ['perdu', 'trouve'].includes(queryFilter) ? queryFilter : 'all';

    document.querySelectorAll('.filter-pill').forEach((btn) => {
      btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
    });

    applyFilter(initialFilter);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPage);
  } else {
    initPage();
  }
</script>

</body>
</html>
