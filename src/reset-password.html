<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réinitialiser le mot de passe | DocMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#f5a64b",
              bgMain: "#f9f6f2",
              textMuted: "#8e8e8e",
              borderMain: "#e5e0d8",
            },
            borderRadius: {
              v14: "14px",
              v24: "24px",
            },
            fontFamily: {
              bricolage: ["Bricolage Grotesque", "sans-serif"],
              outfit: ["Outfit", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/main.css" />
    <script type="module" src="/js/services/auth.js"></script>

<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: 'Outfit', sans-serif;
    background-color: #f9f6f2;
    overflow: hidden;
  }
  
  .auth-container {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .auth-card {
    background: white;
    width: 100%;
    max-width: 450px;
    border-radius: 32px;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
    position: relative;
    overflow: hidden;
  }

  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: #4a4a4a;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .field-input {
    width: 100%;
    height: 54px;
    background-color: #faf8f5;
    border: 1.5px solid #e5e0d8;
    border-radius: 14px;
    padding: 0 45px;
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
    transition: all 0.2s ease;
  }

  .field-input:focus {
    outline: none;
    border-color: #f5a64b;
    background-color: white;
    box-shadow: 0 0 0 4px rgba(245, 166, 75, 0.1);
  }
</style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <!-- Decoration -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-[#f5a64b]/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-[#f5a64b]/5 rounded-full blur-3xl"></div>

        <div class="flex flex-col gap-8 relative z-10">
          <div class="flex flex-col items-center text-center gap-3">
            <div class="w-16 h-16 bg-[#f5a64b]/10 rounded-2xl flex items-center justify-center text-primary text-3xl mb-2">
              <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="font-bricolage text-3xl font-extrabold tracking-tight text-gray-900">Réinitialisation</h1>
            <p class="text-gray-500 font-medium">Définissez votre nouveau mot de passe.</p>
          </div>

          <form id="reset-pw-form" class="flex flex-col gap-5" onsubmit="handleResetPassword(event)">
            <div class="flex flex-col">
              <label class="field-label"><i class="fa-solid fa-lock text-primary text-[11px]"></i> Nouveau mot de passe</label>
              <div class="relative flex items-center group">
                <i class="fa-solid fa-lock absolute left-3.5 text-[#c4bab0] text-[14px] pointer-events-none transition-colors group-focus-within:text-primary"></i>
                <input type="password" id="new-password" placeholder="••••••••" class="field-input" required />
              </div>
            </div>

            <div class="flex flex-col">
              <label class="field-label"><i class="fa-solid fa-check-double text-primary text-[11px]"></i> Confirmer le mot de passe</label>
              <div class="relative flex items-center group">
                <i class="fa-solid fa-check-double absolute left-3.5 text-[#c4bab0] text-[14px] pointer-events-none transition-colors group-focus-within:text-primary"></i>
                <input type="password" id="confirm-password" placeholder="••••••••" class="field-input" required />
              </div>
            </div>

            <button type="submit" id="btn-reset-submit" class="p-[15px_20px] bg-primary text-white rounded-v14 font-bricolage text-[17px] font-bold cursor-pointer flex items-center justify-center gap-[9px] transition-all shadow-lg shadow-primary/30 active:scale-[0.98] mt-2" data-loading-text="Mise à jour...">
              Réinitialiser le mot de passe
            </button>
            
            <a href="/login.html" class="text-center text-[14px] font-semibold text-textMuted hover:text-primary transition-colors">
              <i class="fa-solid fa-arrow-left mr-2"></i>Retour à la connexion
            </a>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
