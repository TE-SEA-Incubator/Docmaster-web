<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profil public</title>
<link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon" />

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
     <link href="css/output.css" rel="stylesheet" />

    <style>
        body {
            background: linear-gradient(180deg, #eaeaea, #dcdcdc);
        }

        .avatar-bg {
            background: #f3d1b8;
        }
    </style>

</head>


<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-5xl bg-white rounded-xl shadow p-6">

        <!-- HEADER -->

        <div class="flex justify-between items-center mb-6">

            <div class="flex items-center gap-2 text-gray-700 font-semibold">
                <i class="fa-regular fa-user text-orange-500"></i>
                Profil public
            </div>

            <button onclick="enableEdit()" class="text-orange-500 font-semibold hover:underline">
                Modifier
            </button>

        </div>


        <!-- CONTENU -->

        <div class="grid md:grid-cols-[120px_1fr] gap-6 items-center">

            <!-- AVATAR -->

            <div class="relative">

                <img id="avatarPreview" src="https://i.pravatar.cc/150" class="w-24 h-24 rounded-xl object-cover">

                <input type="file" id="avatarInput" accept="image/*" class="hidden">

                <button onclick="document.getElementById('avatarInput').click()"
                    class="absolute bottom-0 right-0 bg-white shadow p-2 rounded">

                    <i class="fa-solid fa-camera text-gray-500"></i>

                </button>

            </div>


            <!-- INFOS -->

            <div class="grid md:grid-cols-2 gap-y-6 gap-x-10">

                <div>
                    <p class="text-xs uppercase text-gray-400 font-semibold">Nom complet</p>
                    <p class="font-semibold text-gray-700 editable">Jean Dupont</p>
                </div>

                <div>
                    <p class="text-xs uppercase text-gray-400 font-semibold">Adresse e-mail</p>
                    <p class="font-semibold text-gray-700 editable">jean.dupont@docmaster.fr</p>
                </div>

                <div>
                    <p class="text-xs uppercase text-gray-400 font-semibold">Rôle</p>
                    <p class="font-semibold text-gray-700 editable">Administrateur système</p>
                </div>

                <div>
                    <p class="text-xs uppercase text-gray-400 font-semibold">Localisation</p>
                    <p class="font-semibold text-gray-700 editable">Paris, France</p>
                </div>

            </div>

        </div>

    </div>


    <script>

        /* ============================= */
        /* CHANGER PHOTO PROFIL */
        /* ============================= */

        const avatarInput = document.getElementById("avatarInput")
        const avatarPreview = document.getElementById("avatarPreview")

        avatarInput.addEventListener("change", function () {

            const file = this.files[0]

            if (file) {

                const reader = new FileReader()

                reader.onload = function (e) {

                    avatarPreview.src = e.target.result

                }

                reader.readAsDataURL(file)

            }

        })


        /* ============================= */
        /* MODIFIER LES INFOS */
        /* ============================= */

        let editMode = false

        function enableEdit() {

            const fields = document.querySelectorAll(".editable")

            fields.forEach(field => {

                if (!editMode) {

                    let value = field.innerText

                    let input = document.createElement("input")

                    input.value = value

                    input.className = "border rounded px-2 py-1 w-full"

                    field.replaceWith(input)

                } else {

                    let input = field

                    let span = document.createElement("p")

                    span.className = "font-semibold text-gray-700 editable"

                    span.innerText = input.value

                    input.replaceWith(span)

                }

            })

            editMode = !editMode

        }

    </script>


</body>

</html>
