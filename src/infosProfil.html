<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DocMaster — Paramètres</title>
         <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet">
        <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon" />
        <script src="https://cdn.tailwindcss.com"></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: { DEFAULT: "#F5A64B", dark: "#D98A30", light: "#FEF0DC" },
                            "green-dark": "#1E3A2F",
                            "green-mid": "#2D5A42",
                            "green-light": "#E8F5EE",
                            bgMain: "#F4EFE6",
                            surface: "#FFFFFF",
                            surface2: "#FAF7F2",
                            textMain: "#1A1A1A",
                            textMuted: "#9CA3AF",
                            borderMain: "#EAE3D8"
                        },
                        fontFamily: {
                            poppins: ["Poppins", "sans-serif"],
                            bricolage: ["Bricolage Grotesque", "sans-serif"]
                        }
                    }
                }
            };
        </script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <link href="css/output.css" rel="stylesheet" />
        <script src="./js/auth.js"></script>
        <script src="./js/sidebar.js"></script>
        <style>
            :root { --sidebar: 260px; }
            html, body { font-family: "Poppins", sans-serif; background: #f4efe6; }
            .sidebar {
                position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar);
                transform: translateX(-100%);
                transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 50;
                overflow-y: auto;
            }
            .sidebar.open { transform: translateX(0); }
            .sb-overlay {
                display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45);
                z-index: 40; backdrop-filter: blur(3px); opacity: 0; pointer-events: none;
                transition: opacity 0.28s;
            }
            .sb-overlay.show { display: block; opacity: 1; pointer-events: all; }
            .sb-item.active { background: rgba(245, 166, 75, 0.15); color: #fff; }
            .sb-item.active::before {
                content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
                width: 3px; height: 55%; background: #f5a64b; border-radius: 0 3px 3px 0;
            }
            .custom-scroll::-webkit-scrollbar { width: 4px; }
            .custom-scroll::-webkit-scrollbar-thumb { background: #ddd5c8; border-radius: 10px; }
            .profile-input {
                width: 100%; background: #faf7f2; border: 1px solid #eae3d8; border-radius: 12px;
                padding: 11px 12px; font-size: 13px; color: #1a1a1a; outline: none;
            }
            .profile-input:focus { border-color: #f5a64b; box-shadow: 0 0 0 3px rgba(245, 166, 75, 0.12); }
            @media (min-width: 900px) {
                body { display: flex; height: 100vh; overflow: hidden; }
                .sidebar { position: relative; transform: none !important; flex-shrink: 0; }
                .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
                .main-content { flex: 1; overflow-y: auto; }
            }
            @media (max-width: 899px) {
                .main-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
            }
        </style>
    </head>
    <body>
        <div id="sidebar-root"></div>

        <div class="main-wrapper" id="mainWrapper">
            <header class="sticky top-0 z-30 h-[58px] bg-white border-b border-[#EAE3D8] flex items-center px-4 gap-3 flex-shrink-0">
                <button class="w-9 h-9 flex items-center justify-center rounded-[9px] bg-[#FAF7F2] border border-[#EAE3D8] text-[#1A1A1A] text-base" onclick="toggleSb()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <span class="font-bricolage text-base font-bold text-[#1A1A1A] tracking-tight">Paramètres du profil</span>
                <div class="ml-auto flex items-center gap-2">
                    <div class="w-[26px] h-[26px] rounded-[6px] bg-[#1E3A2F] flex items-center justify-center font-bricolage text-[11px] font-extrabold text-[#F5A64B]" id="topInitial">JM</div>
                    <span class="text-[12.5px] font-semibold text-[#1A1A1A] hidden sm:block" id="topName">Jean-Marc</span>
                </div>
            </header>

            <div class="main-content custom-scroll p-4 sm:p-6">
                <div class="max-w-4xl mx-auto flex flex-col gap-5">
                    <div class="bg-white border border-[#EAE3D8] rounded-[18px] p-5 sm:p-6">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 rounded-[11px] bg-[#FEF0DC] flex items-center justify-center">
                                <i class="fa-solid fa-user-gear text-[#F5A64B]"></i>
                            </div>
                            <div>
                                <h1 class="font-bricolage text-[20px] sm:text-[22px] font-extrabold text-[#1A1A1A]">Mon profil</h1>
                                <p class="text-[12px] text-[#9CA3AF]">Ces informations sont liées à votre compte connecté.</p>
                            </div>
                        </div>

                        <form id="profile-form" class="grid md:grid-cols-2 gap-4">
                            <div class="md:col-span-2">
                                <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Nom complet</label>
                                <input id="profile-name" class="profile-input" type="text" placeholder="Votre nom" required />
                            </div>
                            <div class="md:col-span-2">
                                <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Email</label>
                                <input id="profile-email" class="profile-input" type="email" placeholder="Votre email" required />
                            </div>
                            <div>
                                <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Ville</label>
                                <input id="profile-city" class="profile-input" type="text" placeholder="Ex: Yaoundé" />
                            </div>
                            <div>
                                <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Téléphone</label>
                                <input id="profile-phone" class="profile-input" type="tel" placeholder="Ex: +237 6XX XXX XXX" />
                            </div>

                            <div class="md:col-span-2 flex items-center justify-between gap-3 pt-1">
                                <p id="profile-feedback" class="text-[12px] text-[#9CA3AF]"></p>
                                <button type="submit" data-loading-text="Enregistrement..." class="px-5 py-2.5 rounded-[12px] bg-[#F5A64B] text-white text-[13px] font-bold hover:bg-[#D98A30] transition-colors">
                                    Enregistrer les modifications
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const user = typeof getCurrentUser === "function" ? getCurrentUser() : null;
                if (!user) return;

                document.getElementById("profile-name").value = user.name || "";
                document.getElementById("profile-email").value = user.email || "";
                document.getElementById("profile-city").value = user.city || "";
                document.getElementById("profile-phone").value = user.phone || "";

                const form = document.getElementById("profile-form");
                const feedback = document.getElementById("profile-feedback");

                form.addEventListener("submit", function (event) {
                    event.preventDefault();

                    const payload = {
                        name: document.getElementById("profile-name").value.trim(),
                        email: document.getElementById("profile-email").value.trim(),
                        city: document.getElementById("profile-city").value.trim(),
                        phone: document.getElementById("profile-phone").value.trim(),
                    };

                    if (typeof saveCurrentUserProfile !== "function") {
                        feedback.textContent = "Impossible d'enregistrer pour le moment.";
                        feedback.className = "text-[12px] text-red-500";
                        return;
                    }

                    const result = saveCurrentUserProfile(payload);
                    if (result.success) {
                        feedback.textContent = "Profil mis à jour avec succès.";
                        feedback.className = "text-[12px] text-green-600";
                    } else {
                        feedback.textContent = result.message || "Une erreur est survenue.";
                        feedback.className = "text-[12px] text-red-500";
                    }
                });
            });
        </script>
    </body>
</html>
