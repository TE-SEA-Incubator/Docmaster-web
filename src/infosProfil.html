<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DocMaster — Paramètres</title>
         <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet">
        <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon" />
        <link rel="stylesheet" href="./css/input.css" />
        <script src="https://cdn.tailwindcss.com"></script>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />


        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: { DEFAULT: '#F5A64B', dark: '#D98A30', light: '#FEF0DC' },
                            green: { dark: '#1E3A2F', mid: '#2D5A42', light: '#E8F5EE' },
                            bgMain: '#F4EFE6',
                            surface: '#FFFFFF',
                            surface2: '#FAF7F2',
                            textMain: '#1A1A1A',
                            textMuted: '#6B7280',
                            borderMain: '#EAE3D8',
                            accent: '#F5A64B',
                            blobGreen: '#A8CBAF',
                            blobPeach: '#E8B89A',
                        },
                        fontFamily: {
                            poppins: ['Poppins', 'sans-serif'],
                            bricolage: ['"Bricolage Grotesque"', 'sans-serif'],
                        }
                    }
                }
            };
        </script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        <link href="/css/main.css" rel="stylesheet" />
        <script type="module" src="/js/services/auth.js"></script>
        <script src="./js/ui/sidebar.js"></script>
        <style>
            :root { --sidebar: 260px; }
            html, body { font-family: "Poppins", sans-serif; background: #f4efe6; }
            .sidebar {
                position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar);
                transform: translateX(-100%);
                transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 50;
                overflow-y: auto;
            }
            .sidebar.open { transform: translateX(0); }
            .sb-overlay {
                display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45);
                z-index: 40; backdrop-filter: blur(3px); opacity: 0; pointer-events: none;
                transition: opacity 0.28s;
            }
            .sb-overlay.show { display: block; opacity: 1; pointer-events: all; }
            .sb-item.active { background: rgba(245, 166, 75, 0.15); color: #fff; }
            .sb-item.active::before {
                content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
                width: 3px; height: 55%; background: #f5a64b; border-radius: 0 3px 3px 0;
            }
            .custom-scroll::-webkit-scrollbar { width: 4px; }
            .custom-scroll::-webkit-scrollbar-thumb { background: #ddd5c8; border-radius: 10px; }
            .profile-input {
                width: 100%; background: #faf7f2; border: 1px solid #eae3d8; border-radius: 12px;
                padding: 11px 12px; font-size: 13px; color: #1a1a1a; outline: none;
            }
            .profile-input:focus { border-color: #f5a64b; box-shadow: 0 0 0 3px rgba(245, 166, 75, 0.12); }
            @media (min-width: 900px) {
                body { display: flex; height: 100vh; overflow: hidden; }
                .sidebar { position: relative; transform: none !important; flex-shrink: 0; }
                .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
                .main-content { flex: 1; overflow-y: auto; }
            }
            @media (max-width: 899px) {
                .main-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
            }
        </style>
        <script type="module" src="/js/index.js"></script>
    </head>
    <body>
  <script type="module" src="/js/utils/ui-helpers.js"></script>
        <div id="sidebar-root"></div>

        <div class="main-wrapper" id="mainWrapper">
            <header class="sticky top-0 z-30 h-[58px] bg-white border-b border-[#EAE3D8] flex items-center px-4 gap-3 flex-shrink-0">
                <button class="w-9 h-9 flex items-center justify-center rounded-[9px] bg-[#FAF7F2] border border-[#EAE3D8] text-[#1A1A1A] text-base" onclick="toggleSb()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <span class="font-bricolage text-base font-bold text-[#1A1A1A] tracking-tight">Paramètres du profil</span>
                <div class="ml-auto flex items-center gap-2">
                    <div class="w-[26px] h-[26px] rounded-[6px] bg-[#1E3A2F] flex items-center justify-center font-bricolage text-[11px] font-extrabold text-[#F5A64B] overflow-hidden" id="topInitialWrap">
                        <img id="topPhoto" src="" class="w-full h-full object-cover hidden" />
                        <span id="topInitial">JM</span>
                    </div>
                    <span class="text-[12.5px] font-semibold text-[#1A1A1A] hidden sm:block" id="topName">Jean-Marc</span>
                </div>
            </header>

            <div class="main-content custom-scroll p-4 sm:p-6">
                <div class="max-w-4xl mx-auto flex flex-col gap-5">
                    <!-- Completion Notice -->
                    <div id="completion-notice" class="hidden bg-blue-50 border border-blue-100 rounded-2xl p-4 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-blue-500 shadow-sm shrink-0">
                            <i class="fa-solid fa-circle-info"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-[13px] font-bold text-blue-900">Complétez votre profil</p>
                            <p class="text-[12px] text-blue-700/80">Certaines informations sont manquantes. Un profil complet renforce la sécurité de vos documents.</p>
                        </div>
                    </div>

                    <div class="bg-white border border-[#EAE3D8] rounded-[18px] overflow-hidden">
                        <!-- Tabs Header -->
                        <div class="flex border-b border-[#EAE3D8] bg-[#FAF7F2]/50">
                            <button onclick="switchProfileTab('personal')" id="tab-btn-personal" class="flex-1 py-4 text-[13px] font-bold text-[#F5A64B] border-b-2 border-[#F5A64B] transition-all">
                                <i class="fa-solid fa-user-gear mr-2"></i> Personnel
                            </button>
                            <button onclick="switchProfileTab('preferences')" id="tab-btn-preferences" class="flex-1 py-4 text-[13px] font-bold text-[#9CA3AF] border-b-2 border-transparent hover:text-[#1A1A1A] transition-all">
                                <i class="fa-solid fa-sliders mr-2"></i> État Civil & Préf.
                            </button>
                        </div>

                        <div class="p-5 sm:p-6">
                            <form id="profile-form" class="space-y-6">
                                <!-- TAB 1: PERSONAL -->
                                <div id="tab-personal" class="space-y-6">
                                    <!-- Profile Photo Section -->
                                    <div class="flex flex-col sm:flex-row items-center gap-5 pb-4 border-b border-[#F4EFE6]">
                                        <div class="relative group">
                                            <div class="w-24 h-24 rounded-2xl bg-primary-light flex items-center justify-center overflow-hidden border-2 border-white shadow-sm">
                                                <img id="profile-preview" src="./assets/images/user-default.png" class="w-full h-full object-cover" alt="Photo de profil" />
                                                <div id="initials-placeholder" class="text-2xl font-bold text-primary hidden">JM</div>
                                            </div>
                                            <label for="photo-input" class="absolute -bottom-2 -right-2 w-8 h-8 bg-white rounded-lg shadow-md border border-[#EAE3D8] flex items-center justify-center cursor-pointer hover:bg-[#FAF7F2] transition-colors">
                                                <i class="fa-solid fa-camera text-[13px] text-[#4B5563]"></i>
                                                <input type="file" id="photo-input" accept="image/*" class="hidden" />
                                            </label>
                                        </div>
                                        <div class="text-center sm:text-left">
                                            <h3 class="font-bold text-[15px] text-[#1A1A1A]">Photo de profil</h3>
                                            <p class="text-[12px] text-[#9CA3AF] mt-0.5">PNG, JPG ou GIF. Max 5MB.</p>
                                        </div>
                                    </div>

                                    <div class="grid md:grid-cols-2 gap-4">
                                        <div>
                                            <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Prénom</label>
                                            <input id="profile-prenom" class="profile-input" type="text" placeholder="Votre prénom" required />
                                        </div>
                                        <div>
                                            <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Nom</label>
                                            <input id="profile-nom" class="profile-input" type="text" placeholder="Votre nom" required />
                                        </div>
                                        <div class="md:col-span-2">
                                            <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Email (Non modifiable)</label>
                                            <input id="profile-email" class="profile-input bg-[#F4EFE6] cursor-not-allowed" type="email" readonly />
                                        </div>
                                        <div>
                                            <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Ville actuelle</label>
                                            <input id="profile-city" class="profile-input" type="text" placeholder="Ex: Yaoundé" />
                                        </div>
                                        <div>
                                            <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Téléphone</label>
                                            <input id="profile-phone" class="profile-input" type="tel" placeholder="Ex: +237 6XX XXX XXX" />
                                        </div>
                                    </div>
                                </div>

                                <!-- TAB 2: PREFERENCES -->
                                <div id="tab-preferences" class="hidden space-y-6">
                                    <div class="grid md:grid-cols-2 gap-4">
                                        <div>
                                            <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Date de naissance</label>
                                            <input id="profile-birth-date" class="profile-input" type="date" />
                                        </div>
                                        <div>
                                            <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Lieu de naissance</label>
                                            <input id="profile-birth-place" class="profile-input" type="text" placeholder="Ex: Douala" />
                                        </div>
                                        <div class="md:col-span-2">
                                            <label class="text-[11px] font-bold text-[#4B5563] uppercase tracking-wide mb-1.5 block">Devise préférée (Currency)</label>
                                            <select id="profile-currency" class="profile-input">
                                                <option value="XAF">Franc CFA (XAF)</option>
                                                <option value="EUR">Euro (EUR)</option>
                                                <option value="USD">US Dollar (USD)</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <!-- Common Footer -->
                                <div class="md:col-span-2 flex flex-col sm:flex-row items-center justify-between gap-4 pt-4 border-t border-[#F4EFE6]">
                                    <p id="profile-feedback" class="text-[12px]"></p>
                                    <button type="submit" id="save-btn" class="w-full sm:w-auto px-6 py-3 rounded-[12px] bg-[#F5A64B] text-white text-[14px] font-bold hover:bg-[#D98A30] transition-all flex items-center justify-center gap-2 shadow-sm">
                                        <span>Enregistrer les modifications</span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script type="module">
            import { getSession, handleUpdateProfile, updateUI } from './js/services/auth.js';
            import { startButtonLoader, stopButtonLoader } from './js/utils/index.js';

            window.switchProfileTab = function(tab) {
                const isPersonal = tab === 'personal';
                
                // Tabs visibility
                document.getElementById('tab-personal').classList.toggle('hidden', !isPersonal);
                document.getElementById('tab-preferences').classList.toggle('hidden', isPersonal);
                
                // Buttons active state
                const btnPerso = document.getElementById('tab-btn-personal');
                const btnPref = document.getElementById('tab-btn-preferences');
                
                if (isPersonal) {
                    btnPerso.className = "flex-1 py-4 text-[13px] font-bold text-[#F5A64B] border-b-2 border-[#F5A64B] transition-all";
                    btnPref.className = "flex-1 py-4 text-[13px] font-bold text-[#9CA3AF] border-b-2 border-transparent hover:text-[#1A1A1A] transition-all";
                } else {
                    btnPerso.className = "flex-1 py-4 text-[13px] font-bold text-[#9CA3AF] border-b-2 border-transparent hover:text-[#1A1A1A] transition-all";
                    btnPref.className = "flex-1 py-4 text-[13px] font-bold text-[#F5A64B] border-b-2 border-[#F5A64B] transition-all";
                }
            };

            function checkProfileCompletion(session) {
                const notice = document.getElementById('completion-notice');
                if (!notice) return;
                
                const fields = ['telephone', 'ville', 'date_naissance', 'lieu_naissance'];
                const isIncomplete = fields.some(f => !session[f] || session[f] === "");
                
                notice.classList.toggle('hidden', !isIncomplete);
            }

            document.addEventListener("DOMContentLoaded", function () {
                const session = getSession();
                if (!session) {
                    window.location.href = '/login.html';
                    return;
                }

                // Check completion
                checkProfileCompletion(session);

                // Fill form
                const prenomInput = document.getElementById("profile-prenom");
                const nomInput = document.getElementById("profile-nom");
                const emailInput = document.getElementById("profile-email");
                const cityInput = document.getElementById("profile-city");
                const phoneInput = document.getElementById("profile-phone");
                const birthDateInput = document.getElementById("profile-birth-date");
                const birthPlaceInput = document.getElementById("profile-birth-place");
                const currencyInput = document.getElementById("profile-currency");
                
                const previewImg = document.getElementById("profile-preview");
                const placeholder = document.getElementById("initials-placeholder");

                prenomInput.value = session.prenom || "";
                nomInput.value = session.nom || "";
                emailInput.value = session.email || "";
                cityInput.value = session.ville || "";
                phoneInput.value = session.telephone || "";
                
                if (session.date_naissance) {
                    birthDateInput.value = new Date(session.date_naissance).toISOString().split('T')[0];
                }
                birthPlaceInput.value = session.lieu_naissance || "";
                currencyInput.value = session.currency || "XAF";

                if (session.photo_url) {
                    previewImg.src = session.photo_url.startsWith('http') ? session.photo_url : '/' + session.photo_url.replace(/^\//, '');
                    previewImg.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                } else {
                    previewImg.classList.add('hidden');
                    placeholder.textContent = session.initial || "DM";
                    placeholder.classList.remove('hidden');
                }

                // Photo preview logic
                const photoInput = document.getElementById("photo-input");
                photoInput.addEventListener("change", function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            previewImg.src = e.target.result;
                            previewImg.classList.remove('hidden');
                            placeholder.classList.add('hidden');
                        };
                        reader.readAsDataURL(file);
                    }
                });

                const form = document.getElementById("profile-form");
                const feedback = document.getElementById("profile-feedback");
                const saveBtn = document.getElementById("save-btn");

                form.addEventListener("submit", async function (event) {
                    event.preventDefault();
                    
                    feedback.textContent = "";
                    if (window.toggleLoader) window.toggleLoader(true);
                    startButtonLoader(saveBtn);

                    const userData = {
                        prenom: prenomInput.value.trim(),
                        nom: nomInput.value.trim(),
                        ville: cityInput.value.trim(),
                        telephone: phoneInput.value.trim(),
                        date_naissance: birthDateInput.value,
                        lieu_naissance: birthPlaceInput.value.trim(),
                        currency: currencyInput.value
                    };

                    // Add photo if selected
                    if (photoInput.files[0]) {
                        userData.photo_profile = photoInput.files[0];
                    }

                    try {
                        const result = await handleUpdateProfile(userData);
                        
                        if (result.success) {
                            feedback.textContent = "✓ Profil mis à jour avec succès.";
                            feedback.className = "text-[12px] text-green-600 font-semibold";
                            
                            // Re-check completion
                            checkProfileCompletion(result.user);
                            
                            // Re-update the UI header/sidebar
                            updateUI(result.user);
                            
                            if (!result.user.photo_url) {
                                placeholder.textContent = result.user.initial;
                            }
                        } else {
                            feedback.textContent = "✕ " + (result.message || "Une erreur est survenue.");
                            feedback.className = "text-[12px] text-red-500 font-semibold";
                        }
                    } catch (error) {
                        feedback.textContent = "✕ Une erreur réseau est survenue.";
                        feedback.className = "text-[12px] text-red-500 font-semibold";
                    } finally {
                        stopButtonLoader(saveBtn);
                        if (window.toggleLoader) window.toggleLoader(false);
                    }
                });
            });
        </script>
</body>
</html>
