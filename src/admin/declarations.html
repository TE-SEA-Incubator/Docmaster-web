<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DocMaster — Déclarations</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/input.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gray-50:  #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-600: #6b7280;
            --gray-900: #111827;
            --accent:       #F5A64B;
            --accent-dark:  #D48D3B;
            --accent-light: #FFF9F0;
        }

        body { font-family: 'Inter', sans-serif; background-color: #fff; color: var(--gray-900); margin: 0; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 240px; background: #1E312B; border-right: none; height: 100vh; display: flex; flex-direction: column; padding: 1.5rem 1rem; flex-shrink: 0; color: #fff; }
        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; padding: 0 0.5rem; }
        .logo-area span { font-weight: 600; font-size: 0.9375rem; color: #fff; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 0.8125rem; font-weight: 500; text-decoration: none; transition: all 0.15s; margin-bottom: 2px; }
        .nav-link i { width: 16px; text-align: center; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; }

        /* Main */
        .main { flex: 1; overflow-y: auto; padding: 2rem 3rem; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; margin: 0; }
        .page-header p { font-size: 0.875rem; color: var(--gray-600); margin-top: 4px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area"><img src="../assets/images/logo.png" alt="Logo" class="h-6"><span>Admin Panel</span></div>
        <nav class="flex-1">
            <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Vue d'ensemble</a>
            <a href="users.html" class="nav-link"><i class="fa-solid fa-users"></i> Utilisateurs</a>
            <a href="document-types.html" class="nav-link"><i class="fa-solid fa-file-invoice"></i> Documents</a>
            <a href="subscriptions.html" class="nav-link"><i class="fa-solid fa-crown"></i> Abonnements</a>
            <a href="transactions.html" class="nav-link"><i class="fa-solid fa-receipt"></i> Transactions</a>
            <a href="referrals.html" class="nav-link"><i class="fa-solid fa-user-friends"></i> Parrainages</a>
            <a href="declarations.html" class="nav-link active"><i class="fa-solid fa-folder-open"></i> Déclarations</a>
            <a href="withdrawals.html" class="nav-link"><i class="fa-solid fa-money-bill-transfer"></i> Retraits</a>
            <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Paramètres</a>
        </nav>
        <div class="mt-auto pt-4 border-t border-white/10">
            <a href="#" id="adminLogout" class="nav-link text-red-400 hover:text-red-300">
                <i class="fa-solid fa-right-from-bracket"></i> Déconnexion
            </a>
        </div>
    </aside>

    <main class="main">

        <!-- Top bar -->
        <div class="navbar bg-white border-b border-base-200 px-8 min-h-[64px] flex-shrink-0">
            <div class="flex-1">
                <h2 class="font-bricolage text-xl font-extrabold tracking-tight">Gestion des Déclarations</h2>
            </div>
            <div class="flex-none gap-3">
                <div class="avatar placeholder">
                    <div class="bg-base-200 text-base-content rounded-full w-10 border-2 border-white shadow-sm">
                        <span class="text-xs font-bold">AD</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scrollable content -->
        <div class="flex-1 overflow-y-auto p-8 custom-scroll">

            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bricolage text-lg font-bold">Toutes les déclarations</h3>
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="Rechercher..." class="input input-sm input-bordered w-64 bg-white" />
                    <button class="btn btn-sm btn-primary text-white" onclick="loadDeclarations()"><i class="fa-solid fa-rotate-right"></i> Actualiser</button>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white border border-base-200 rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="table w-full">
                        <thead class="bg-base-200/50 text-base-content">
                            <tr>
                                <th>Date</th>
                                <th>Référence</th>
                                <th>Photo</th>
                                <th>Type Doc</th>
                                <th>Nom Document</th>
                                <th>Déclaration</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="declarationsTableBody">
                            <tr>
                                <td colspan="7" class="text-center py-8 text-base-content/60">
                                    <span class="loading loading-spinner loading-md text-primary"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    </main>

    <!-- Scripts -->
    <script type="module">
        import { API_BASE_URL, getAuthHeaders } from '../js/services/api.js';

        window.loadDeclarations = async function() {
            try {
                const tbody = document.getElementById('declarationsTableBody');
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8"><span class="loading loading-spinner loading-md text-primary"></span></td></tr>';
                
                // Use the search endpoint without filters to get all declarations (or create a dedicated admin endpoint)
                const response = await fetch(`${API_BASE_URL}/declarations?limit=100`, {
                    headers: getAuthHeaders(),
                });
                const result = await response.json();
                const data = result.data || [];
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-base-content/60">Aucune déclaration trouvée.</td></tr>';
                    return;
                }

                renderTable(data);

                // Add search listener
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const search = e.target.value.toLowerCase();
                    const filtered = data.filter(d => 
                        (d.doc_type || '').toLowerCase().includes(search) ||
                        (d.owner_name || '').toLowerCase().includes(search) ||
                        (d.identifiant_doc_dm || '').toLowerCase().includes(search)
                    );
                    renderTable(filtered);
                });

            } catch (error) {
                console.error('Erreur', error);
                document.getElementById('declarationsTableBody').innerHTML = '<tr><td colspan="7" class="text-center py-8 text-red-500">Erreur lors du chargement.</td></tr>';
            }
        };

        function getStatusBadge(status) {
            switch(status) {
                case 'MATCHED': return '<span class="badge badge-success badge-sm text-white">Match</span>';
                case 'PENDING': return '<span class="badge badge-warning badge-sm">En attente</span>';
                case 'RETURNED': return '<span class="badge badge-info badge-sm text-white">Retourné</span>';
                default: return `<span class="badge badge-ghost badge-sm">${status}</span>`;
            }
        }

        window.downloadPDF = async function(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/declarations/${id}/pdf`, {
                    headers: getAuthHeaders(),
                });
                
                if (!response.ok) throw new Error("Erreur de téléchargement");
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Declaration_${id}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                alert("Impossible de générer le PDF.");
                console.error(error);
            }
        };

        function renderTable(data) {
            const tbody = document.getElementById('declarationsTableBody');
            tbody.innerHTML = data.map(d => {
                const photoUrl = d.photo_recto ? (d.photo_recto.startsWith('http') ? d.photo_recto : `http://localhost:5000/${d.photo_recto}`) : null;
                
                return `
                <tr class="hover">
                    <td class="whitespace-nowrap text-xs">${new Date(d.created_at).toLocaleString('fr-FR')}</td>
                    <td class="font-mono text-xs">${d.identifiant_doc_dm || (d.id ? d.id.substring(0,8) : 'N/A')}</td>
                    <td>
                        ${photoUrl ? 
                            `<img src="${photoUrl}" class="w-10 h-10 rounded-lg object-cover border border-base-300 cursor-pointer" onclick="window.open('${photoUrl}', '_blank')" />` : 
                            `<div class="w-10 h-10 rounded-lg bg-base-200 flex items-center justify-center text-[10px] text-base-content/40 italic">N/A</div>`
                        }
                    </td>
                    <td class="font-semibold text-sm">${d.doc_type}</td>
                    <td class="text-sm">${d.owner_name || 'N/A'}</td>
                    <td>
                        <span class="badge ${d.declaration_type === 'LOST' ? 'badge-error' : 'badge-primary'} badge-sm text-white">
                            ${d.declaration_type === 'LOST' ? 'Perdu' : 'Trouvé'}
                        </span>
                    </td>
                    <td>${getStatusBadge(d.status)}</td>
                    <td>
                        <button class="btn btn-xs btn-primary text-white" onclick="downloadPDF('${d.id}')">
                            <i class="fa-solid fa-file-pdf"></i> PDF
                        </button>
                    </td>
                </tr>
            `;}).join('');
        }

        window.loadDeclarations();
    </script>
</body>
</html>
