<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DocMaster — Paramètres</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gray-50:  #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-600: #6b7280;
            --gray-900: #111827;
            --accent:       #F5A64B;
            --accent-dark:  #D48D3B;
            --accent-light: #FFF9F0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fff;
            color: var(--gray-900);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Flat Style */
        .sidebar {
            width: 240px;
            background: #1E312B;
            border-right: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
            color: #fff;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
        }
        .logo-area span {
            font-weight: 600;
            font-size: 0.9375rem;
            letter-spacing: -0.02em;
            color: #fff;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8125rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.15s;
            margin-bottom: 2px;
        }
        .nav-link i { width: 16px; font-size: 14px; text-align: center; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; }

        /* Main Content */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
        }
        .page-header { margin-bottom: 2.5rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; margin: 0; }
        .page-header p { font-size: 0.875rem; color: var(--gray-600); margin-top: 4px; }

        /* Section Card */
        .section {
            background: #fff;
            border: 0.5px solid var(--gray-200);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            max-width: 800px;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }
        .icon-wrap {
            width: 34px; height: 34px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .icon-green  { background: #FFF9F0; color: #D48D3B; }
        .icon-blue   { background: #E6F1FB; color: #185FA5; }
        .icon-purple { background: #EEEDFE; color: #534AB7; }
        
        .section-title { font-size: 0.9375rem; font-weight: 500; margin: 0; }
        .section-sub { font-size: 0.8125rem; color: var(--gray-400); margin: 0; }

        /* Form Fields */
        .field { margin-bottom: 1.25rem; }
        .field label {
            font-size: 0.75rem;
            color: var(--gray-600);
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .input-group {
            display: flex;
            gap: 0;
        }
        .field input {
            background: var(--gray-50);
            border: 0.5px solid var(--gray-200);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.875rem;
            color: var(--gray-900);
            width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,153,34,0.12);
        }
        .unit-tag {
            background: var(--gray-100);
            border: 0.5px solid var(--gray-200);
            border-left: none;
            padding: 0 12px;
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-600);
            border-radius: 0 8px 8px 0;
        }
        .field .input-with-unit { border-radius: 8px 0 0 8px; }

        .btn-save {
            background: var(--accent);
            color: #fff;
            border: none; border-radius: 8px;
            padding: 10px 24px;
            font-size: 0.875rem; font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }
        .btn-save:hover { background: var(--accent-dark); }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

        .loading-spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .loading-spinner { display: inline-block; }
        .loading .btn-text { display: none; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo-area">
            <img src="../assets/images/logo.png" alt="DocMaster" class="h-6">
            <span>Admin Panel</span>
        </div>
        <nav class="flex-1">
            <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Vue d'ensemble</a>
            <a href="users.html" class="nav-link"><i class="fa-solid fa-users"></i> Utilisateurs</a>
            <a href="document-types.html" class="nav-link"><i class="fa-solid fa-file-invoice"></i> Documents</a>
            <a href="subscriptions.html" class="nav-link"><i class="fa-solid fa-crown"></i> Abonnements</a>
            <a href="transactions.html" class="nav-link"><i class="fa-solid fa-receipt"></i> Transactions</a>
            <a href="referrals.html" class="nav-link"><i class="fa-solid fa-user-friends"></i> Parrainages</a>
            <a href="declarations.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Déclarations</a>
            <a href="withdrawals.html" class="nav-link"><i class="fa-solid fa-money-bill-transfer"></i> Retraits</a>
            <a href="settings.html" class="nav-link active"><i class="fa-solid fa-gear"></i> Paramètres</a>
        </nav>
        <div class="mt-auto pt-4 border-t border-white/10">
            <a href="#" id="adminLogout" class="nav-link text-red-400 hover:text-red-300">
                <i class="fa-solid fa-right-from-bracket"></i> Déconnexion
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <header class="flex items-center justify-between mb-8">
            <div class="page-header mb-0">
                <h1>Paramètres globaux</h1>
                <p>Gérez les seuils financiers et les récompenses de la plateforme.</p>
            </div>
            <div class="flex items-center gap-4">
                <button class="relative p-2 text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-bell text-xl"></i>
                    <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
                </button>
                <div class="w-10 h-10 rounded-full bg-[#F5A64B] flex items-center justify-center text-white font-bold">
                    A
                </div>
            </div>
        </header>

        <div id="settings-container">
            <!-- Settings cards will be injected here -->
            <div class="flex items-center justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { adminService } from '../js/services/admin.js';
        import { initAdminUI } from '../js/services/admin-ui.js';

        const container = document.getElementById('settings-container');

        const settingConfigs = {
            'min_withdrawal_amount': { 
                label: 'Seuil de retrait', 
                sub: 'Montant minimum requis pour demander un retrait',
                unit: 'XAF', 
                icon: 'fa-sack-dollar',
                theme: 'icon-green'
            },
            'points_per_declaration': { 
                label: 'Récompense déclaration', 
                sub: 'Points attribués pour chaque document déclaré',
                unit: 'PTS', 
                icon: 'fa-star',
                theme: 'icon-blue'
            },
            'referral_points': { 
                label: 'Bonus parrainage', 
                sub: 'Points offerts au parrain lors d\'une inscription',
                unit: 'PTS', 
                icon: 'fa-user-plus',
                theme: 'icon-purple'
            }
        };

        async function loadSettings() {
            try {
                const settings = await adminService.getAllSettings();
                container.innerHTML = '';
                
                Object.entries(settings).forEach(([key, value]) => {
                    const cfg = settingConfigs[key] || { label: key, sub: '', unit: '', icon: 'fa-gear', theme: 'icon-green' };
                    
                    const section = document.createElement('div');
                    section.className = 'section';
                    section.innerHTML = `
                        <div class="section-header">
                            <div class="icon-wrap ${cfg.theme}">
                                <i class="fa-solid ${cfg.icon} text-[14px]"></i>
                            </div>
                            <div>
                                <h2 class="section-title">${cfg.label}</h2>
                                <p class="section-sub">${cfg.sub}</p>
                            </div>
                        </div>
                        <div class="field">
                            <label>Valeur actuelle</label>
                            <div class="input-group">
                                <input type="number" value="${value}" class="input-with-unit" id="input-${key}">
                                <span class="unit-tag">${cfg.unit}</span>
                            </div>
                        </div>
                        <button class="btn-save" onclick="window.saveSetting('${key}')">
                            <span class="btn-text">Mettre à jour</span>
                            <div class="loading-spinner"></div>
                        </button>
                    `;
                    container.appendChild(section);
                });
            } catch (error) {
                container.innerHTML = `<p class="text-red-500 font-medium text-sm">Erreur : ${error.message}</p>`;
            }
        }

        window.saveSetting = async (key) => {
            const input = document.getElementById(`input-${key}`);
            const btn = input.parentElement.parentElement.nextElementSibling;
            
            try {
                btn.classList.add('loading');
                btn.disabled = true;
                const result = await adminService.updateSetting(key, input.value);
                if (result.success) {
                    // Success feedback
                    const originalText = btn.querySelector('.btn-text').textContent;
                    btn.querySelector('.btn-text').textContent = 'Enregistré ✓';
                    setTimeout(() => {
                        btn.querySelector('.btn-text').textContent = originalText;
                    }, 2000);
                }
            } catch (error) {
                alert(error.message);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        };

        loadSettings();
    </script>
</body>
</html>
