<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DocMaster — Types de Documents</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gray-50:  #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-600: #6b7280;
            --gray-900: #111827;
            --accent:       #F5A64B;
            --accent-dark:  #D48D3B;
            --accent-light: #FFF9F0;
        }

        body { font-family: 'Inter', sans-serif; background-color: #fff; color: var(--gray-900); margin: 0; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 240px; background: #1E312B; border-right: none; height: 100vh; display: flex; flex-direction: column; padding: 1.5rem 1rem; flex-shrink: 0; color: #fff; }
        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; padding: 0 0.5rem; }
        .logo-area span { font-weight: 600; font-size: 0.9375rem; color: #fff; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 0.8125rem; font-weight: 500; text-decoration: none; transition: all 0.15s; margin-bottom: 2px; }
        .nav-link i { width: 16px; text-align: center; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; }

        /* Main */
        .main { flex: 1; overflow-y: auto; padding: 2rem 3rem; }
        .page-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; margin: 0; }
        .page-header p { font-size: 0.875rem; color: var(--gray-600); margin-top: 4px; }

        .btn-primary { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.15s; }
        .btn-primary:hover { background: var(--accent-dark); }

        /* Grid */
        .grid-types { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        
        /* Card Flat */
        .type-card { background: #fff; border: 0.5px solid var(--gray-200); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; transition: border-color 0.15s; }
        .type-card:hover { border-color: var(--accent); }
        
        .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .icon-wrap { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--accent-light); color: var(--accent-dark); }
        
        .type-name { font-size: 1rem; font-weight: 600; margin: 0 0 4px 0; }
        .type-code { font-size: 0.625rem; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.05em; }
        .type-desc { font-size: 0.8125rem; color: var(--gray-600); margin: 0.75rem 0; line-height: 1.5; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 0.5px dashed var(--gray-200); margin-top: auto; }
        .price-label { font-size: 0.6875rem; color: var(--gray-400); text-transform: uppercase; }
        .price-value { font-size: 1rem; font-weight: 600; color: var(--accent-dark); }
        
        .badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .mini-badge { padding: 4px 8px; background: var(--gray-50); border: 0.5px solid var(--gray-200); border-radius: 6px; font-size: 0.6875rem; color: var(--gray-600); text-align: center; }

        .btn-icon { width: 28px; height: 28px; border-radius: 6px; border: 0.5px solid var(--gray-200); background: #fff; color: var(--gray-400); cursor: pointer; transition: all 0.15s; }
        .btn-icon:hover { color: var(--accent-dark); border-color: var(--accent); background: var(--accent-light); }

        /* Modal Flat Style (Skill: Flat Admin UI) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(17, 24, 39, 0.4); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-card { background: #fff; border-radius: 12px; width: 100%; max-width: 500px; padding: 2rem; border: 0.5px solid var(--gray-200); box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--gray-900); display: flex; align-items: center; gap: 8px; }
        .modal-title::before { content: ""; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }
        
        .field { margin-bottom: 1.25rem; }
        .field label { font-size: 0.75rem; font-weight: 500; color: var(--gray-600); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
        .field input, .field textarea { width: 100%; background: var(--gray-50); border: 0.5px solid var(--gray-200); border-radius: 8px; padding: 10px 12px; font-size: 0.875rem; color: var(--gray-900); transition: all 0.2s; }
        .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245, 166, 75, 0.1); background: #fff; }
        
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 1rem; }
        .btn-confirm { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.15s; }
        .btn-cancel { background: #fff; border: 0.5px solid var(--gray-200); padding: 10px 24px; border-radius: 8px; font-size: 0.875rem; color: var(--gray-600); cursor: pointer; }
        .btn-cancel:hover { background: var(--gray-50); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area"><img src="../assets/images/logo.png" alt="Logo" class="h-6"><span>Admin Panel</span></div>
        <nav class="flex-1">
            <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Vue d'ensemble</a>
            <a href="users.html" class="nav-link"><i class="fa-solid fa-users"></i> Utilisateurs</a>
            <a href="document-types.html" class="nav-link active"><i class="fa-solid fa-file-invoice"></i> Documents</a>
            <a href="subscriptions.html" class="nav-link"><i class="fa-solid fa-crown"></i> Abonnements</a>
            <a href="transactions.html" class="nav-link"><i class="fa-solid fa-receipt"></i> Transactions</a>
            <a href="referrals.html" class="nav-link"><i class="fa-solid fa-user-friends"></i> Parrainages</a>
            <a href="declarations.html" class="nav-link"><i class="fa-solid fa-folder-open"></i> Déclarations</a>
            <a href="withdrawals.html" class="nav-link"><i class="fa-solid fa-money-bill-transfer"></i> Retraits</a>
            <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Paramètres</a>
        </nav>
        <div class="mt-auto pt-4 border-t border-white/10">
            <a href="#" id="adminLogout" class="nav-link text-red-400 hover:text-red-300">
                <i class="fa-solid fa-right-from-bracket"></i> Déconnexion
            </a>
        </div>
    </aside>

    <main class="main">
        <header class="page-header">
            <div>
                <h1>Types de Documents</h1>
                <p>Configurez les tarifs et commissions par type de document.</p>
            </div>
            <button class="btn-primary" onclick="openModal()">+ Nouveau Type</button>
        </header>

        <div id="types-container" class="grid-types">
            <!-- Data will be injected here -->
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal-overlay">
        <div class="modal-card">
            <h3 class="modal-title" id="modal-title">Type de Document</h3>
            <form id="type-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="field"><label>Nom</label><input name="nom" required placeholder="ex: Passeport"></div>
                    <div class="field"><label>Code</label><input name="code" required placeholder="ex: PASSPORT"></div>
                </div>
                <div class="field"><label>Description</label><textarea name="description" rows="2"></textarea></div>
                
                <div class="grid grid-cols-3 gap-4 bg-gray-50 p-4 rounded-lg border border-gray-150">
                    <div class="field"><label>Prix Total</label><input name="prix_retrouvaille" type="number" value="5000"></div>
                    <div class="field"><label>% Trouveur</label><input name="finder_percent" type="number" value="80"></div>
                    <div class="field"><label>% App</label><input name="app_percent" type="number" value="20"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="field"><label>Points (+)</label><input name="points_recompense" type="number" value="50"></div>
                    <div class="field"><label>Icone</label><input name="icone" placeholder="ex: passport"></div>
                </div>

                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" class="px-5 py-2 text-sm text-gray-500" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { adminService } from '../js/services/admin.js';
        import { initAdminUI } from '../js/services/admin-ui.js';

        const container = document.getElementById('types-container');
        const modal = document.getElementById('modal');
        const form = document.getElementById('type-form');
        let currentId = null;

        async function loadTypes() {
            try {
                const types = await adminService.getDocumentTypes();
                container.innerHTML = '';
                types.forEach(t => {
                    const card = document.createElement('div');
                    card.className = `type-card ${!t.is_active ? 'opacity-50' : ''}`;
                    card.innerHTML = `
                        <div class="card-head">
                            <div class="icon-wrap"><i class="fa-solid fa-${t.icone || 'file'}"></i></div>
                            <div class="flex gap-2">
                                <button class="btn-icon" onclick="window.editType('${t.id}')"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn-icon" onclick="window.toggleType('${t.id}')"><i class="fa-solid fa-power-off"></i></button>
                            </div>
                        </div>
                        <h3 class="type-name">${t.nom}</h3>
                        <span class="type-code">${t.code}</span>
                        <p class="type-desc">${t.description || '...'}</p>
                        <div class="badge-grid">
                            <div class="mini-badge">+${t.points_recompense} PTS</div>
                            <div class="mini-badge">Trouveur ${t.finder_percent}%</div>
                        </div>
                        <div class="price-row">
                            <span class="price-label">Tarif récupération</span>
                            <span class="price-value">${t.prix_retrouvaille} XAF</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        window.openModal = () => {
            currentId = null;
            form.reset();
            document.getElementById('modal-title').textContent = 'Nouveau Type de Document';
            modal.style.display = 'flex';
        };

        window.closeModal = () => modal.style.display = 'none';

        window.editType = async (id) => {
            currentId = id;
            const types = await adminService.getDocumentTypes();
            const t = types.find(x => x.id === id);
            if (!t) return;
            form.nom.value = t.nom;
            form.code.value = t.code;
            form.description.value = t.description || '';
            form.prix_retrouvaille.value = t.prix_retrouvaille;
            form.finder_percent.value = t.finder_percent;
            form.app_percent.value = t.app_percent;
            form.points_recompense.value = t.points_recompense;
            form.icone.value = t.icone || '';
            document.getElementById('modal-title').textContent = 'Modifier le Type';
            modal.style.display = 'flex';
        };

        window.toggleType = async (id) => {
            try {
                await adminService.toggleDocumentType(id);
                loadTypes();
            } catch (error) { alert(error.message); }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(form));
            try {
                if (currentId) await adminService.updateDocumentType(currentId, data);
                else await adminService.createDocumentType(data);
                closeModal();
                loadTypes();
            } catch (error) { alert(error.message); }
        };

        loadTypes();
    </script>
</body>
</html>
