<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DocMaster — Parrainages</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/input.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gray-50:  #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-600: #6b7280;
            --gray-900: #111827;
            --accent:       #F5A64B;
            --accent-dark:  #D48D3B;
            --accent-light: #FFF9F0;
        }

        body { font-family: 'Inter', sans-serif; background-color: #fff; color: var(--gray-900); margin: 0; display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 240px; background: #1E312B; border-right: none; height: 100vh; display: flex; flex-direction: column; padding: 1.5rem 1rem; flex-shrink: 0; color: #fff; }
        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; padding: 0 0.5rem; }
        .logo-area span { font-weight: 600; font-size: 0.9375rem; color: #fff; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 0.8125rem; font-weight: 500; text-decoration: none; transition: all 0.15s; margin-bottom: 2px; }
        .nav-link i { width: 16px; text-align: center; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; }

        /* Main */
        .main { flex: 1; overflow-y: auto; padding: 2rem 3rem; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; margin: 0; }
        .page-header p { font-size: 0.875rem; color: var(--gray-600); margin-top: 4px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area"><img src="../assets/images/logo.png" alt="Logo" class="h-6"><span>Admin Panel</span></div>
        <nav class="flex-1">
            <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Vue d'ensemble</a>
            <a href="users.html" class="nav-link"><i class="fa-solid fa-users"></i> Utilisateurs</a>
            <a href="document-types.html" class="nav-link"><i class="fa-solid fa-file-invoice"></i> Documents</a>
            <a href="subscriptions.html" class="nav-link"><i class="fa-solid fa-crown"></i> Abonnements</a>
            <a href="transactions.html" class="nav-link"><i class="fa-solid fa-receipt"></i> Transactions</a>
            <a href="referrals.html" class="nav-link active"><i class="fa-solid fa-user-friends"></i> Parrainages</a>
            <a href="withdrawals.html" class="nav-link"><i class="fa-solid fa-money-bill-transfer"></i> Retraits</a>
            <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Paramètres</a>
        </nav>
        <div class="mt-auto pt-4 border-t border-white/10">
            <a href="#" id="adminLogout" class="nav-link text-red-400 hover:text-red-300">
                <i class="fa-solid fa-right-from-bracket"></i> Déconnexion
            </a>
        </div>
    </aside>

    <main class="main">

        <!-- Top bar -->
        <div class="navbar bg-white border-b border-base-200 px-8 min-h-[64px] flex-shrink-0">
            <div class="flex-1">
                <h2 class="font-bricolage text-xl font-extrabold tracking-tight">Gestion des Parrainages</h2>
            </div>
            <div class="flex-none gap-3">
                <div class="avatar placeholder">
                    <div class="bg-base-200 text-base-content rounded-full w-10 border-2 border-white shadow-sm">
                        <span class="text-xs font-bold">AD</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scrollable content -->
        <div class="flex-1 overflow-y-auto p-8 custom-scroll">

            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bricolage text-lg font-bold">Tous les parrainages</h3>
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="Rechercher par nom..." class="input input-sm input-bordered w-64 bg-white" />
                    <button class="btn btn-sm btn-primary text-white" onclick="loadReferrals()"><i class="fa-solid fa-rotate-right"></i> Actualiser</button>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white border border-base-200 rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="table w-full">
                        <thead class="bg-base-200/50 text-base-content">
                            <tr>
                                <th>Date</th>
                                <th>Parrain</th>
                                <th>Filleul</th>
                                <th>Statut</th>
                                <th>Points Gagnés</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="referralsTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-8 text-base-content/60">
                                    <span class="loading loading-spinner loading-md text-primary"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    </main>

    <!-- Modals or scripts -->
    <script type="module">
        import { adminService } from '../js/services/admin.js';
        import { initAdminUI } from '../js/services/admin-ui.js';

        window.loadReferrals = async function() {
            try {
                const tbody = document.getElementById('referralsTableBody');
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8"><span class="loading loading-spinner loading-md text-primary"></span></td></tr>';
                
                const data = await adminService.getAllReferrals();
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-base-content/60">Aucun parrainage trouvé.</td></tr>';
                    return;
                }

                renderTable(data);

                // Add search listener
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const search = e.target.value.toLowerCase();
                    const filtered = data.filter(r => 
                        (r.parrain_nom + ' ' + r.parrain_prenom).toLowerCase().includes(search) ||
                        (r.filleul_nom + ' ' + r.filleul_prenom).toLowerCase().includes(search)
                    );
                    renderTable(filtered);
                });

            } catch (error) {
                console.error('Erreur lors du chargement des parrainages', error);
                document.getElementById('referralsTableBody').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-red-500">Erreur lors du chargement des données.</td></tr>';
            }
        };

        window.rewardReferral = async function(id) {
            if (!confirm('Voulez-vous vraiment attribuer la récompense à ce parrain ?')) return;
            
            try {
                const result = await adminService.rewardReferral(id);
                if (result.success) {
                    alert('Succès: La récompense a été attribuée.');
                    loadReferrals();
                } else {
                    alert('Erreur: ' + (result.error || 'Erreur inconnue'));
                }
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };

        function renderTable(data) {
            const tbody = document.getElementById('referralsTableBody');
            tbody.innerHTML = data.map(r => `
                <tr class="hover">
                    <td class="whitespace-nowrap">${new Date(r.created_at).toLocaleDateString('fr-FR')}</td>
                    <td>
                        <div class="font-semibold text-sm">${r.parrain_prenom || ''} ${r.parrain_nom || ''}</div>
                        <div class="text-xs text-base-content/60">${r.parrain_email}</div>
                    </td>
                    <td>
                        <div class="font-semibold text-sm">${r.filleul_prenom || ''} ${r.filleul_nom || ''}</div>
                        <div class="text-xs text-base-content/60">${r.filleul_email}</div>
                    </td>
                    <td>
                        <span class="badge ${r.recompense_attribuee ? 'badge-success' : 'badge-warning'} badge-sm">
                            ${r.recompense_attribuee ? 'Récompensé' : 'En attente'}
                        </span>
                    </td>
                    <td class="font-bricolage font-bold text-primary">+${r.points_gagnes || 500} pts</td>
                    <td>
                        <div class="flex gap-1">
                            ${!r.recompense_attribuee ? 
                                `<button class="btn btn-xs btn-primary text-white" onclick="rewardReferral('${r.id}')">Récompenser</button>` : 
                                `<button class="btn btn-xs btn-disabled">Récompensé</button>`
                            }
                            <button class="btn btn-xs btn-ghost text-primary" onclick="alert('Détails: Parrainage ID ${r.id}')">Détails</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.loadReferrals();
    </script>
</body>
</html>
